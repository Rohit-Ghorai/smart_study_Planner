<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t('login_title') }} - {{ t('app_title') }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="auth-shell">
    <section class="card auth-card">
      <h1>{{ t('login_title') }}</h1>
      {% if errors %}
      <div class="status-card error compact">
        <ul>
          {% for error in errors %}
          <li>{{ error }}</li>
          {% endfor %}
        </ul>
      </div>
      {% endif %}

      <form action="/login" method="post" class="planner-form">
        <div class="field-row">
          <label for="username">{{ t('username') }}</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div class="field-row">
          <label for="password">{{ t('password') }}</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="primary-button">{{ t('login_button') }}</button>
      </form>

      <p class="auth-meta">No account? <a href="/register">{{ t('nav_register') }}</a></p>
      <p class="auth-meta"><a href="/">{{ t('nav_home') }}</a></p>
    </section>
  </main>
</body>
</html>
