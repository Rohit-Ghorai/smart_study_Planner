<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t('register_title') }} - {{ t('app_title') }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="auth-shell">
    <section class="card auth-card">
      <h1>{{ t('register_title') }}</h1>

      {% if success_message %}
      <div class="status-card success compact">
        <p>{{ success_message }} You can now <a href="/login">{{ t('nav_login') }}</a>.</p>
      </div>
      {% endif %}

      {% if errors %}
      <div class="status-card error compact">
        <ul>
          {% for error in errors %}
          <li>{{ error }}</li>
          {% endfor %}
        </ul>
      </div>
      {% endif %}

      <form action="/register" method="post" class="planner-form">
        <div class="field-row">
          <label for="username">{{ t('username') }}</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div class="field-row">
          <label for="password">{{ t('password') }}</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="primary-button">{{ t('register_button') }}</button>
      </form>

      <p class="auth-meta">Already have an account? <a href="/login">{{ t('nav_login') }}</a></p>
      <p class="auth-meta"><a href="/">{{ t('nav_home') }}</a></p>
    </section>
  </main>
</body>
</html>
